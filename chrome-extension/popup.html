<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>RSI Checkout Rehearsal</title>
    <style>
      :root { color-scheme: dark; }
      body {
        font: 13px/1.45 ui-monospace, Menlo, monospace;
        background: #0b1622;
        color: #d6e7ff;
        margin: 0;
        padding: 12px 14px;
        width: 280px;
      }
      h1 {
        margin: 0 0 8px;
        font-size: 13px;
        color: #6df2a9;
        letter-spacing: 0.04em;
      }
      h2 {
        margin: 12px 0 6px;
        font-size: 11px;
        color: #6df2a9;
        letter-spacing: 0.06em;
        text-transform: uppercase;
      }
      .row {
        display: flex;
        justify-content: space-between;
        gap: 8px;
        padding: 2px 0;
      }
      .k { color: #7ea0c2; }
      .v { color: #fff; font-weight: 600; word-break: break-all; text-align: right; }
      .ok { color: #00e676; }
      .warn { color: #ffd166; }
      hr {
        border: none;
        border-top: 1px solid #1f3550;
        margin: 10px 0;
      }
      kbd {
        background: #1a2638;
        border: 1px solid #2c4566;
        border-radius: 3px;
        padding: 0 4px;
        font-size: 11px;
        color: #cfe;
      }
      .note {
        color: #9ab5d3;
        font-size: 11px;
        margin-top: 6px;
      }
      label.toggle {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 4px 0;
        cursor: pointer;
        user-select: none;
      }
      label.toggle input { margin: 0; accent-color: #00e676; }
      label.toggle .desc { color: #d6e7ff; flex: 1; }
      label.toggle .hint { color: #7ea0c2; font-size: 10px; }
      #reset {
        background: transparent;
        color: #7ea0c2;
        border: 1px solid #2c4566;
        border-radius: 3px;
        padding: 3px 8px;
        font-size: 11px;
        cursor: pointer;
        margin-top: 6px;
      }
      #reset:hover { color: #fff; border-color: #6df2a9; }
    </style>
  </head>
  <body>
    <h1>RSI checkout rehearsal</h1>

    <div class="row"><span class="k">Tab</span><span class="v" id="tab-host">—</span></div>
    <div class="row"><span class="k">Status</span><span class="v" id="status">—</span></div>
    <div class="row"><span class="k">Version</span><span class="v" id="version">—</span></div>

    <h2>Toggles</h2>
    <label class="toggle"><input type="checkbox" id="t-showPanel">       <span class="desc">Show overlay panel</span></label>
    <label class="toggle"><input type="checkbox" id="t-highlightButtons"><span class="desc">Highlight buy buttons</span></label>
    <label class="toggle"><input type="checkbox" id="t-paymentBanner">   <span class="desc">Payment-page warning banner</span></label>
    <label class="toggle"><input type="checkbox" id="t-autoClickMax">    <span class="desc">Auto-click "Max credit" button</span></label>
    <label class="toggle"><input type="checkbox" id="t-scAutofill">      <span class="desc">Store-credit input prefill (fallback)</span></label>
    <label class="toggle"><input type="checkbox" id="t-measureLatency">  <span class="desc">Measure latency to RSI</span></label>
    <button id="reset">Reset to defaults</button>

    <hr />

    <div class="row"><span class="k">Hotkeys</span></div>
    <div class="row"><span class="k">Focus next buy</span><span class="v"><kbd>F</kbd></span></div>
    <div class="row"><span class="k">Click Max credit</span><span class="v"><kbd>M</kbd></span></div>
    <div class="row"><span class="k">Refresh panel</span><span class="v"><kbd>R</kbd></span></div>
    <div class="row"><span class="k">Hide / show</span><span class="v"><kbd>Esc</kbd></span></div>

    <div class="note">
      Toggles persist across browser sessions and apply instantly to any
      open RSI tab. Default: all on. Never clicks Place Order or fills
      payment-card fields.
    </div>

    <script src="popup.js"></script>
  </body>
</html>
